<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="window" id="window">
    <!-- Titlebar -->
    <header class="titlebar drag">
      <div class="avatar" aria-hidden="true">
        <div class="pulse"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="app-title">Aura</div>
        <div id="status" class="status">Idle</div>
      </div>
      <div class="win-controls no-drag">
        <button class="ctrl" id="settingsBtn" title="Settings">⚙️</button>
        <button class="ctrl" id="minBtn" title="Minimize">–</button>
        <button class="ctrl" id="closeBtn" title="Close">×</button>
      </div>
    </header>

    <!-- Main content -->
    <main class="content">
      <!-- Quick suggestions -->
      <div class="suggestions no-drag">
        <button class="chip">Summarize screen</button>
        <button class="chip">Find action buttons</button>
        <button class="chip">Explain this error</button>
      </div>

      <!-- Chat area -->
      <div class="chat" id="chat"></div>

      <!-- Input bar -->
      <div class="inputbar no-drag">
        <button class="icon" id="micBtn" title="Hold to talk">🎤</button>
        <input id="prompt" type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Prompt" />
        <button class="send" id="sendBtn" title="Send">↵</button>
      </div>
    </main>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="closeSettingsBtn" class="ctrl">×</button>
      </div>
      <div class="settings-content">
        <div class="control-item">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect"></select>
        </div>
        <div class="control-item">
          <label for="pitchRange">Pitch</label>
          <input id="pitchRange" type="range" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-item">
          <label for="rateRange">Rate</label>
          <input id="rateRange" type="range" min="0.6" max="1.6" step="0.05" value="1">
        </div>
        <div class="control-item">
          <label for="modeSelect">Input Mode</label>
          <select id="modeSelect">
            <option value="wake">Wake Word</option>
            <option value="mic">Mic Only</option>
            <option value="hybrid" selected>Hybrid</option>
          </select>
        </div>
        <div class="control-item">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
